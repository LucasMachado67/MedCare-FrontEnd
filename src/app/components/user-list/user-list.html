<div class="user-line">
    <div class="username">
        <span class="name">{{user.name}}</span>
        <span class="email">{{user.email}}</span>
    </div>
@if (currentPath.includes('medics')) {
    <span>{{user.crm}}</span>
    <span class="speciality">{{user.medicalSpeciality}}</span>
}@else if (currentPath.includes('assistants')) {
    <span>{{user.registrationNumber}}</span>
    <span class="speciality">{{user.status}}</span>
}@else {
    <span>{{user.city}}</span>
    <span class="speciality">{{user.state}}</span>
}
    <span class="phone">{{user.phone}}</span>   
    <button title="Ações" (click)="getUserInfo(user.id)">View</button>
</div>
